<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>押印 | 推し活観測ログ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Hachi+Maru+Pop&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <p class="brand-kicker">Oshi Log</p>
        <h1>押印</h1>
        <p class="brand-copy">推しごとの観測記録を静かに積み上げるログブック。</p>
      </div>

      <section class="sidebar-section">
        <div class="section-title-row">
          <h2 class="section-title">推し一覧</h2>
          <span id="oshiCount" class="count-chip">4人</span>
        </div>
        <nav id="oshiList" class="oshi-list" aria-label="推し一覧"></nav>
      </section>
    </aside>

    <section class="workspace">
      <header class="workspace-header">
        <div>
          <p class="workspace-kicker">観測ログ</p>
          <h2 id="viewTitle" class="workspace-title">はうきさん</h2>
        </div>
        <div id="memberBadge" class="member-badge">SECRET BLUE</div>
      </header>

      <section class="hero-card">
        <div class="hero-copy">
          <p id="memberRole" class="hero-label">SECRET BLUE</p>
          <h3 id="memberName" class="hero-name">はうきさん</h3>
          <p id="memberDescription" class="hero-description"></p>
        </div>
        <div class="hero-meta">
          <div class="meta-box">
            <span class="meta-label">ログ件数</span>
            <strong id="logCount">0</strong>
          </div>
          <div class="meta-box">
            <span class="meta-label">最新記録</span>
            <strong id="lastObserved">まだありません</strong>
          </div>
        </div>
      </section>

      <section class="panel-grid">
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Log</p>
              <h3>記録を追加</h3>
            </div>
          </div>

          <form id="logForm" class="log-form">
            <label class="field">
              <span>タイトル</span>
              <input id="logTitle" name="title" type="text" placeholder="例: 配信を見た" required>
            </label>

            <label class="field">
              <span>日付</span>
              <input id="logDate" name="date" type="date" required>
            </label>

            <label class="field">
              <span>メモ</span>
              <textarea id="logMemo" name="memo" rows="5" placeholder="気づいたこと、うれしかったこと、残しておきたいこと"></textarea>
            </label>

            <button class="primary-button" type="submit">記録を追加する</button>
            <p id="formMessage" class="form-message" aria-live="polite"></p>
          </form>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="panel-kicker">Timeline</p>
              <h3>観測記録</h3>
            </div>
          </div>

          <div id="emptyState" class="empty-state">
            <p class="empty-title">まだ観測記録がありません</p>
            <p class="empty-copy">左の推しを選んで、最初の記録を追加してください。</p>
          </div>

          <ul id="logList" class="log-list" aria-label="観測記録一覧"></ul>
        </section>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
